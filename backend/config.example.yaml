# Backend runtime config.
#
# UI-created vibes define station name, RSS sources, host tone, host format,
# and episode length. Keep this file for provider/model settings and server
# fallbacks that are not station identity.

news:
  language: "en-US"
  country: "US"

weather:
  # Fallback location until the UI sends a listener/station weather location.
  name: "Lisbon"
  latitude: 38.7223
  longitude: -9.1393

ai:
  model: "openrouter/openai/gpt-oss-20b:nitro"
  api_key_env: "OPENROUTER_API_KEY"
  temperature: 0.7
  max_tokens: 4000
  reasoning:
    effort: "low"
    exclude: true

tts:
  enabled: true
  provider: "elevenlabs"
  model: "elevenlabs/eleven_turbo_v2_5"
  response_format: "mp3"
  api_key_env: "ELEVENLABS_API_KEY"
  single_voice: true
  primary_voice: "host"
  words_per_minute: 155
  voices:
    host:
      voice: "alloy"
      words_per_minute: 155
      settings:
        stability: 0.45
        similarity_boost: 0.75
        style: 0.25
        use_speaker_boost: true
