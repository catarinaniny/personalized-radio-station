station_name: "VibeFM"
style: "casual, concise morning radio"
duration: "5 minutes"

news:
  language: "en-US"
  country: "US"
  topics:
    - "artificial intelligence"
    - "startups"
    - "music technology"
  rss_feeds:
    - "https://techcrunch.com/feed/"
    - "https://www.producthunt.com/feed"
    - "https://hnrss.org/frontpage"

weather:
  name: "Lisbon"
  latitude: 38.7223
  longitude: -9.1393

ai:
  model: "openrouter/openai/gpt-oss-20b:nitro"
  api_key_env: "OPENROUTER_API_KEY"
  temperature: 0.7
  max_tokens: 4000
  reasoning:
    effort: "low"
    exclude: true

voices:
  intro: "host"
  weather: "host"
  news: "host"
  outro: "host"

tts:
  enabled: true
  provider: "elevenlabs"
  model: "elevenlabs/eleven_turbo_v2_5"
  response_format: "mp3"
  api_key_env: "ELEVENLABS_API_KEY"
  single_voice: true
  primary_voice: "host"
  words_per_minute: 155
  voices:
    host:
      voice: "alloy"
      words_per_minute: 155
      settings:
        stability: 0.45
        similarity_boost: 0.75
        style: 0.25
        use_speaker_boost: true
