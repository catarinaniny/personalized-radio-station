station_name: "Personal Radio"
style: "casual, concise morning radio"
episode_minutes: 5

news:
  language: "en-US"
  country: "US"
  topics:
    - "artificial intelligence"
    - "startups"
    - "music technology"

weather:
  name: "Lisbon"
  latitude: 38.7223
  longitude: -9.1393

ai:
  model: "openrouter/openrouter/auto"
  api_key_env: "OPENROUTER_API_KEY"
  temperature: 0.7
  max_tokens: 1800

voices:
  intro: "host"
  weather: "host"
  news: "anchor"
  outro: "host"

tts:
  enabled: true
  provider: "elevenlabs"
  model: "elevenlabs/eleven_multilingual_v2"
  response_format: "mp3"
  api_key_env: "ELEVENLABS_API_KEY"
  voices:
    host:
      voice: "alloy"
      settings:
        stability: 0.45
        similarity_boost: 0.75
        style: 0.25
        use_speaker_boost: true
    anchor:
      voice: "onyx"
      settings:
        stability: 0.6
        similarity_boost: 0.8
        style: 0.1
        use_speaker_boost: true
