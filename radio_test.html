<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VibeFM API Test</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f4ee;
        --panel: #fffdf8;
        --ink: #202427;
        --muted: #687274;
        --line: #d9d2c6;
        --accent: #0f7c80;
        --accent-dark: #075d62;
        --ready: #207044;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        width: min(620px, calc(100vw - 32px));
        padding: 28px 0;
      }

      .surface {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 55px rgba(31, 36, 40, 0.12);
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.1;
      }

      .subhead {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.45;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .mode-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      label.mode {
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        cursor: pointer;
        font-weight: 650;
      }

      label.mode:has(input:checked) {
        border-color: var(--accent);
        color: var(--accent-dark);
      }

      input,
      textarea {
        font: inherit;
      }

      input[type="radio"] {
        accent-color: var(--accent);
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .field input,
      .field textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: transparent;
        color: var(--ink);
      }

      .field input {
        min-height: 44px;
        padding: 0 12px;
      }

      .field textarea {
        min-height: 112px;
        padding: 10px 12px;
        line-height: 1.35;
        resize: vertical;
      }

      button {
        width: 100%;
        min-height: 52px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: white;
        font: inherit;
        font-size: 16px;
        font-weight: 760;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-top: 20px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--line);
      }

      #status {
        min-height: 24px;
        font-weight: 700;
      }

      #timer {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      #segments,
      #debug {
        list-style: none;
        padding: 0;
        margin: 14px 0 0;
        display: grid;
        gap: 8px;
      }

      #segments li,
      #debug li {
        display: grid;
        grid-template-columns: 58px 1fr;
        gap: 10px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.35;
      }

      #segments li.ready {
        color: var(--ready);
      }

      .time {
        color: var(--accent-dark);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .section-label {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111414;
          --panel: #181d1c;
          --ink: #eef2f0;
          --muted: #a8b2ad;
          --line: #303938;
          --accent: #2b9da2;
          --accent-dark: #7bd4d8;
          --ready: #6ed69b;
        }

        .surface {
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="surface">
        <h1>VibeFM API Test</h1>
        <p class="subhead">
          Open this file directly in the browser. Keep the backend running at
          <code>http://127.0.0.1:8765</code>.
        </p>

        <div class="grid">
          <label class="field">
            <span>Backend URL</span>
            <input id="apiBase" type="url" value="http://127.0.0.1:8765" />
          </label>

          <div class="mode-row" role="radiogroup" aria-label="Generation mode">
            <label class="mode">
              <input type="radio" name="mode" value="mock" checked />
              Demo
            </label>
            <label class="mode">
              <input type="radio" name="mode" value="real" />
              Real
            </label>
          </div>

          <label class="field">
            <span>Duration minutes</span>
            <input id="duration" type="number" min="1" max="60" step="1" value="2" />
          </label>

          <label class="field">
            <span>RSS feeds</span>
            <textarea id="rssFeeds" rows="4" spellcheck="false">https://techcrunch.com/feed/
https://www.producthunt.com/feed
https://hnrss.org/frontpage</textarea>
          </label>

          <button id="play" type="button">Play VibeFM Test Signal</button>
        </div>

        <div class="status-row">
          <div id="status">Demo mode ready</div>
          <div id="timer">0:00</div>
        </div>

        <div class="section-label">Segments</div>
        <ul id="segments"></ul>

        <div class="section-label">Debug timing</div>
        <ol id="debug"></ol>
      </section>
    </main>

    <script>
      const apiBaseInput = document.querySelector("#apiBase");
      const playButton = document.querySelector("#play");
      const durationInput = document.querySelector("#duration");
      const rssFeedsInput = document.querySelector("#rssFeeds");
      const statusNode = document.querySelector("#status");
      const timerNode = document.querySelector("#timer");
      const segmentsNode = document.querySelector("#segments");
      const debugNode = document.querySelector("#debug");
      const modeInputs = document.querySelectorAll('input[name="mode"]');

      let audioContext = null;
      let eventSource = null;
      let nextStartTime = 0;
      let queuedSegments = 0;
      let playedSegments = 0;
      let totalSegments = 0;
      let generationComplete = false;
      let completed = false;
      let startedAt = 0;
      let timerId = null;

      modeInputs.forEach((input) => input.addEventListener("change", syncModeLabel));
      playButton.addEventListener("click", () => {
        startEpisode().catch((error) => {
          console.error(error);
          addDebug(error.message || "Start failed");
          statusNode.textContent = "Start failed";
          playButton.disabled = false;
          syncButtonLabel();
        });
      });
      syncModeLabel();

      async function startEpisode() {
        await resetPlayer();
        audioContext = new AudioContext();
        await audioContext.resume();
        nextStartTime = audioContext.currentTime + 0.2;
        queuedSegments = 0;
        playedSegments = 0;
        totalSegments = 0;
        generationComplete = false;
        completed = false;
        startedAt = Date.now();
        timerId = window.setInterval(updateTimer, 250);

        playButton.disabled = true;
        playButton.textContent = "Starting";
        statusNode.textContent = "Starting";
        segmentsNode.replaceChildren();
        debugNode.replaceChildren();
        addDebug("Request sent from browser", { elapsed_seconds: 0 });

        const mode = selectedMode();
        const minutes = durationMinutes();
        const response = await fetch(`${apiBase()}/api/episodes`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            mode,
            station_name: "VibeFM",
            style: "warm, direct, late-morning radio",
            duration: `${minutes} minutes`,
            duration_minutes: minutes,
            weather_name: "Lisbon",
            topics: ["artificial intelligence", "startups", "music technology"],
            rss_feeds: rssFeeds(),
          }),
        });

        if (!response.ok) {
          throw new Error(`Episode request failed: ${response.status}`);
        }

        const job = await response.json();
        addDebug(`Mode: ${mode === "real" ? "Real APIs" : "Demo mock"}`);
        addDebug(`Episode ${job.episode_id}`);
        eventSource = new EventSource(`${apiBase()}${job.events_url}`);
        eventSource.addEventListener("status", handleStatus);
        eventSource.addEventListener("script_ready", handleScriptReady);
        eventSource.addEventListener("segment_ready", handleSegmentReady);
        eventSource.addEventListener("complete", handleComplete);
        eventSource.addEventListener("failed", handleFailed);
        eventSource.onerror = () => {
          if (!completed) {
            statusNode.textContent = "Connection retrying";
          }
        };
      }

      async function resetPlayer() {
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
        if (audioContext && audioContext.state !== "closed") {
          await audioContext.close();
        }
        if (timerId) {
          window.clearInterval(timerId);
          timerId = null;
        }
        timerNode.textContent = "0:00";
      }

      function handleStatus(event) {
        const data = JSON.parse(event.data);
        statusNode.textContent = humanStatus(data.status);
        addDebug(data.message || humanStatus(data.status), data);
      }

      function handleScriptReady(event) {
        const data = JSON.parse(event.data);
        totalSegments = data.segment_count;
        statusNode.textContent = "Script ready";
        addDebug(`Script ready (${totalSegments} segments)`, data);
        segmentsNode.replaceChildren(
          ...Array.from({ length: totalSegments }, (_, index) => {
            const item = document.createElement("li");
            item.dataset.index = String(index);
            item.innerHTML =
              '<span class="time">--</span><span>Segment ' + String(index + 1) + " queued</span>";
            return item;
          }),
        );
      }

      async function handleSegmentReady(event) {
        const segment = JSON.parse(event.data);
        addDebug(`Segment ${segment.index + 1} ready: ${segment.title}`, segment);
        try {
          await queueSegment(segment);
        } catch (error) {
          console.error(error);
          statusNode.textContent = "Audio decode failed";
          addDebug(error.message || "Audio decode failed");
        }
      }

      async function queueSegment(segment) {
        const response = await fetch(`${apiBase()}${segment.audio_url}`);
        if (!response.ok) {
          throw new Error(`Segment fetch failed: ${response.status}`);
        }

        const bytes = await response.arrayBuffer();
        const buffer = await audioContext.decodeAudioData(bytes);
        const source = audioContext.createBufferSource();
        source.buffer = buffer;
        source.connect(audioContext.destination);

        const startAt = Math.max(nextStartTime, audioContext.currentTime + 0.06);
        source.start(startAt);
        nextStartTime = startAt + buffer.duration + 0.04;
        queuedSegments += 1;
        playButton.textContent = "Playing";
        source.onended = () => {
          playedSegments += 1;
          statusNode.textContent = `Played ${playedSegments} of ${totalSegments}`;
          finishIfPlaybackDone();
        };

        const item = segmentsNode.querySelector(`[data-index="${segment.index}"]`);
        if (item) {
          item.classList.add("ready");
          item.innerHTML =
            '<span class="time">' +
            formatSeconds(buffer.duration) +
            "</span><span>" +
            segment.title +
            "</span>";
        }
        statusNode.textContent = `Queued ${queuedSegments} of ${totalSegments}`;
      }

      function handleComplete(event) {
        const data = JSON.parse(event.data);
        generationComplete = true;
        statusNode.textContent = "All audio queued";
        addDebug("Generation complete", data);
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
        if (!data.audio_url && queuedSegments === 0) {
          completed = true;
          statusNode.textContent = "Complete, no audio";
          playButton.disabled = false;
          syncButtonLabel();
          return;
        }
        finishIfPlaybackDone();
      }

      function handleFailed(event) {
        const data = JSON.parse(event.data);
        completed = true;
        statusNode.textContent = data.error || "Failed";
        addDebug(data.error || "Generation failed", data);
        playButton.disabled = false;
        syncButtonLabel();
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
      }

      function finishIfPlaybackDone() {
        if (!generationComplete || totalSegments === 0 || playedSegments < totalSegments) {
          return;
        }
        completed = true;
        statusNode.textContent = "Playback complete";
        playButton.disabled = false;
        playButton.textContent = "Play Again";
        if (timerId) {
          window.clearInterval(timerId);
          timerId = null;
        }
      }

      function selectedMode() {
        return document.querySelector('input[name="mode"]:checked')?.value || "mock";
      }

      function durationMinutes() {
        const minutes = Math.max(1, Math.min(60, Math.round(Number(durationInput.value) || 2)));
        durationInput.value = String(minutes);
        return minutes;
      }

      function rssFeeds() {
        return rssFeedsInput.value
          .split(/\n|,/)
          .map((value) => value.trim())
          .filter(Boolean);
      }

      function apiBase() {
        return apiBaseInput.value.replace(/\/+$/, "");
      }

      function syncModeLabel() {
        statusNode.textContent =
          selectedMode() === "real" ? "Real mode ready" : "Demo mode ready";
        syncButtonLabel();
      }

      function syncButtonLabel() {
        if (playButton.disabled) {
          return;
        }
        playButton.textContent = selectedMode() === "real" ? "Play Real Station" : "Play Test Signal";
      }

      function addDebug(label, data = {}) {
        const elapsed =
          typeof data.elapsed_seconds === "number"
            ? data.elapsed_seconds
            : Math.max(0, (Date.now() - startedAt) / 1000);
        const item = document.createElement("li");
        const time = document.createElement("span");
        time.className = "time";
        time.textContent = `${elapsed.toFixed(1)}s`;
        const text = document.createElement("span");
        text.textContent = label;
        item.append(time, text);
        debugNode.append(item);
      }

      function humanStatus(status) {
        return {
          queued: "Queued",
          checking_runtime: "Checking setup",
          fetching_sources: "Collecting sources",
          generating_script: "Generating script",
          rendering_audio: "Rendering audio",
          audio_disabled: "Audio disabled",
        }[status] || status;
      }

      function updateTimer() {
        if (!startedAt || completed) {
          return;
        }
        timerNode.textContent = formatSeconds((Date.now() - startedAt) / 1000);
      }

      function formatSeconds(value) {
        const total = Math.max(0, Math.round(value));
        const minutes = Math.floor(total / 60);
        const seconds = String(total % 60).padStart(2, "0");
        return `${minutes}:${seconds}`;
      }
    </script>
  </body>
</html>
